<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Performer's Lab — Sound Advice Vocal Studio</title>
  <meta name="description" content="The Performer's Lab — weekly video feedback, live masterclasses, and a private community for vocalists." />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* ── FULL-VIEWPORT CENTERED SECTION ── */
    .lab-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 230px);
      padding: 60px 24px;
      text-align: center;
    }

    /* ── CONTENT BLOCK ── */
    .lab-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* ── EYEBROW ── */
    .lab-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── HEADLINE ── */
    .lab-headline {
      font-family: 'Anton', sans-serif;
      font-size: clamp(42px, 6vw, 80px);
      font-weight: 400;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1;
      max-width: 900px;
      margin: 0 auto 28px;
    }

    /* ── BODY ── */
    .lab-body {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(16px, 2vw, 20px);
      color: var(--text-body);
      max-width: 680px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    /* ── BENEFITS LIST ── */
    .lab-benefits {
      list-style: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
    }

    .lab-benefits li {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: var(--white);
    }

    .lab-benefits li::before {
      content: '✓';
      color: var(--teal);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    /* ── CTA BUTTON ── */
    .lab-cta {
      display: inline-block;
      background: var(--teal);
      color: var(--white);
      font-family: 'Anton', sans-serif;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 16px 48px;
      border-radius: 4px;
      border: none;
      transition: background 0.2s;
    }

    .lab-cta:hover {
      background: var(--teal-dark);
    }

    /* ── TAGLINE ── */
    .lab-tagline {
      margin-top: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-dim);
    }

    .lab-tagline a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .lab-tagline a:hover {
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="page-bg-wrap">
    <div class="page-bg" style="opacity: 0.71"></div>
    <div class="page-overlay"></div>
  </div>
  <div class="page-content">
    <div id="site-header"></div>

    <main class="main-content">
      <section class="lab-section">
        <div class="lab-content" id="lab-content">

          <p class="lab-eyebrow">A Sound Advice Vocal Studio Production</p>

          <h1 class="lab-headline" id="lab-headline">The Performer's Lab</h1>

          <p class="lab-body" id="lab-body" style="display:none;"></p>

          <ul class="lab-benefits">
            <li>Weekly Personalized Video Feedback</li>
            <li>Monthly Live Masterclasses</li>
            <li>Private Community + Resource Library</li>
          </ul>

          <a
            href="https://performers-lab.com"
            class="lab-cta"
            id="lab-cta"
            target="_blank"
            rel="noopener"
          >Join Now</a>

          <p class="lab-tagline">
            <a href="https://alittlesoundadvice.com">Powered by Sound Advice Vocal Studio</a>
          </p>

        </div>
      </section>
    </main>

    <div id="site-footer"></div>
  </div>

  <script type="module">
    import { initNav } from '/components.js';
    initNav('performers-lab');

    const SUPABASE_URL = 'https://trtseeytryqwwkoqtkvp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRydHNlZXl0cnlxd3drb3F0a3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNzk2MTUsImV4cCI6MjA5Nzc1NTYxNX0.NjkB2bkn6V-Vz1vfc_Pu0p8c5hXa7i0UpFE7dqKhYeA';

    const DEFAULTS = {
      performers_lab_headline: "The Performer's Lab",
      performers_lab_body:     '',
      performers_lab_cta_label: 'Join Now',
      performers_lab_cta_url:   'https://performers-lab.com',
    };

    async function loadContent() {
      const container = document.getElementById('lab-content');
      container.style.opacity = '0.4';

      let content = { ...DEFAULTS };
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/studio_content?select=key,value`,
          {
            headers: {
              apikey: SUPABASE_ANON_KEY,
              Authorization: `Bearer ${SUPABASE_ANON_KEY}`
            }
          }
        );
        if (res.ok) {
          const rows = await res.json();
          rows.forEach(r => {
            if (Object.prototype.hasOwnProperty.call(DEFAULTS, r.key) && r.value) {
              content[r.key] = r.value;
            }
          });
        }
      } catch(e) {
        console.error("Performer's Lab content load error:", e);
      }

      const headlineEl = document.getElementById('lab-headline');
      const bodyEl     = document.getElementById('lab-body');
      const ctaEl      = document.getElementById('lab-cta');

      headlineEl.textContent = content.performers_lab_headline;
      ctaEl.textContent = content.performers_lab_cta_label;
      ctaEl.href = content.performers_lab_cta_url;

      if (content.performers_lab_body) {
        bodyEl.textContent = content.performers_lab_body;
        bodyEl.style.display = '';
      }

      container.style.opacity = '';
    }

    loadContent();
  </script>
</body>
</html>
